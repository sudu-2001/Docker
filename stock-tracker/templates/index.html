<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Stock Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stock-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            text-align: center;
        }
        .stock-symbol {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }
        .stock-price {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        .stock-change.up   { color: #00ff88; }
        .stock-change.down { color: #ff4444; }
        .chart-container {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .status-bar {
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 14px;
        }
        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 5px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>📈 Real-Time Stock Tracker</h1>

    <div class="status-bar">
        <span class="live-dot"></span>
        Live updates every 5 seconds
    </div>

    <div class="stocks-grid" id="stocks-grid"></div>

    <div class="chart-container">
        <canvas id="priceChart" height="100"></canvas>
    </div>

    <script>
        const socket = io();
        const priceHistory = {};
        const labels = [];
        let chart;

        // Initialize chart
        const ctx = document.getElementById('priceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: []
            },
            options: {
                responsive: true,
                animation: false,
                plugins: {
                    legend: { labels: { color: '#ffffff' } }
                },
                scales: {
                    x: { ticks: { color: '#888' } },
                    y: { ticks: { color: '#888' } }
                }
            }
        });

        const colors = ['#00ff88','#00bfff','#ff6b6b','#ffd700','#ff8c00'];

        socket.on('stock_update', (data) => {
            const grid = document.getElementById('stocks-grid');
            grid.innerHTML = '';

            const time = new Date().toLocaleTimeString();
            if (labels.length > 20) labels.shift();
            labels.push(time);

            data.stocks.forEach((stock, i) => {
                // Update card
                grid.innerHTML += `
                    <div class="stock-card">
                        <div class="stock-symbol">${stock.symbol}</div>
                        <div class="stock-price">$${stock.price}</div>
                        <div class="stock-change ${stock.status}">
                            ${stock.change >= 0 ? '▲' : '▼'}
                            ${Math.abs(stock.change)}%
                        </div>
                    </div>`;

                // Update chart data
                if (!priceHistory[stock.symbol]) {
                    priceHistory[stock.symbol] = [];
                    chart.data.datasets.push({
                        label: stock.symbol,
                        data: priceHistory[stock.symbol],
                        borderColor: colors[i],
                        tension: 0.1,
                        fill: false
                    });
                }
                if (priceHistory[stock.symbol].length > 20) {
                    priceHistory[stock.symbol].shift();
                }
                priceHistory[stock.symbol].push(stock.price);
            });

            chart.update();
        });
    </script>
</body>
</html>
