name: Build, Push Pandas Recon to Docker Hub, and Deploy

on:
  push:
    branches:
      - main  # Triggers the automation every time you push to the main branch

env:
  # ⚠️ REPLACE 'your_dockerhub_username' WITH YOUR ACTUAL DOCKER HUB USERNAME
  DOCKER_HUB_REPO: "your_dockerhub_username/reconciliation-app"
  CONTAINER_NAME: "pandas-recon-service"
  HOST_PORT: "5001"
  CONTAINER_PORT: "5000"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Uses DOCKER_USERNAME to match your pre-existing GitHub Secrets perfectly
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # 🚀 Fixed path casing: Capital 'D' used here to match your directory
          context: ./Docker/pandas/
          file: ./Docker/pandas/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_REPO }}:latest
            ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push  # Ensures the image builds successfully before attempting deploy
    steps:
      - name: SSH into Server and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Logging target server into Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            echo "Stopping and cleaning up old container machinery..."
            docker ps -q --filter name=${{ env.CONTAINER_NAME }} | xargs -r docker stop
            docker ps -a -q --filter name=${{ env.CONTAINER_NAME }} | xargs -r docker rm
            
            echo "Pulling fresh image from Docker Hub..."
            docker pull ${{ env.DOCKER_HUB_REPO }}:latest
            
            echo "Launching updated container on Port ${{ env.HOST_PORT }}..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
              ${{ env.DOCKER_HUB_REPO }}:latest
              
            echo "Cleaning up old dangling docker images..."
            docker image prune -f
