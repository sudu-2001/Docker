name: Build and Deploy Stock Tracker
on:
  push:
    branches:
      - main
    paths:
      - 'stock-tracker/**'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Docker Image
        run: docker build -t teacoffe/vishnu-2001:stock ./stock-tracker
      - name: Push to Docker Hub
        run: docker push teacoffe/vishnu-2001:stock
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install ansible -y
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-keypair.pem
          chmod 400 ~/.ssh/ec2-keypair.pem
      - name: Run Ansible Playbook
        working-directory: stock-tracker/ansible
        run: |
          ansible-playbook \
            -i inventory.ini \
            playbook.yml \
            --private-key ~/.ssh/ec2-keypair.pem
      - name: Verify All Servers
        working-directory: stock-tracker/ansible
        run: |
          ansible -i inventory.ini servers \
            -m command -a "sudo docker ps" \
            --private-key ~/.ssh/ec2-keypair.pem
